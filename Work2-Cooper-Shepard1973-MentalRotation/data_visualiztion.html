<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实验结果折线图</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #333333;
            --text-secondary: #555555;
            --border: #cccccc;
            --grid: #e0e0e0;
            --line-highlight: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Helvetica', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            gap: 20px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            color: var(--text);
        }

        .controls label {
            font-weight: 600;
            margin: 0;
        }

        select {
            padding: 4px 10px;
            border: 1px solid var(--border);
            border-radius: 3px;
            font-size: 0.9rem;
            background: #fff;
            outline: none;
            cursor: pointer;
        }

        select:focus {
            border-color: #4E79A7;
        }

        .chart-container {
            width: 100%;
            max-width: 880px;
            background: #ffffff;
            border: 1px solid var(--border);
            padding: 20px 16px 12px 16px;
        }

        .chart-header {
            text-align: center;
            margin-bottom: 4px;
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
        }

        .chart-subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .chart-wrapper {
            position: relative;
            width: 100%;
        }

        svg {
            display: block;
            width: 100%;
            height: auto;
        }

        /* 图例 */
        .legend-item {
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .legend-item.dimmed {
            opacity: 0.3;
        }

        /* 折线 */
        .line-path {
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: opacity 0.15s, stroke-width 0.15s;
        }

        .line-path.dimmed {
            opacity: 0.15;
        }

        .line-path.highlighted {
            stroke-width: 3.2;
            opacity: 1;
        }

        /* 数据点 */
        .data-dot {
            cursor: pointer;
            transition: opacity 0.15s, r 0.15s;
        }

        .data-dot.dimmed {
            opacity: 0.15;
            pointer-events: none;
        }

        .data-dot.highlighted {
            r: 5.5;
            opacity: 1;
            stroke-width: 2.5;
        }

        /* Tooltip */
        .tooltip {
            position: absolute;
            pointer-events: none;
            background: rgba(30, 30, 30, 0.9);
            color: #ffffff;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.78rem;
            line-height: 1.4;
            white-space: nowrap;
            opacity: 0;
            transform: translate(-50%, -110%);
            transition: opacity 0.12s;
            z-index: 10;
        }

        .tooltip.visible {
            opacity: 1;
        }

        .tooltip .tt-label {
            font-weight: 600;
            font-size: 0.82rem;
            margin-bottom: 1px;
        }

        .tooltip .tt-rt {
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="controls">
        <label for="subjectSelect">视图选择：</label>
        <select id="subjectSelect">
            <option value="__AVERAGE__">总体平均值 (AVG)</option>
        </select>
    </div>

    <div class="chart-container">
        <div class="chart-header">
            <div class="chart-title" id="chartTitle">反应时间随角度变化趋势</div>
            <div class="chart-subtitle" id="chartSubtitle">仅正确试验 (ACC=1) · 按 Block Type 分组</div>
        </div>
        <div class="chart-wrapper" id="chartWrapper"></div>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        (async function () {
            // ==================== 全局配置 ====================
            const ALL_ANGLES = [0, 60, 120, 180, 240, 300, 360];
            const BLOCK_TYPES = ['N', 'I', 'O', 'B', 'C'];

            const COLOR_MAP = {
                'N': '#4E79A7',
                'I': '#F28E2B',
                'O': '#59A14F',
                'B': '#E15759',
                'C': '#B07AA1',
            };

            // ==================== 数据加载 ====================
            let rawData;
            try {
                rawData = await d3.csv('./data.csv');
            } catch (err) {
                document.getElementById('chartWrapper').innerHTML =
                    '<p style="text-align:center;color:#c0392b;padding:40px;">无法读取 data.csv，请检查文件</p>';
                return;
            }

            // 过滤 & 规整
            const filteredData = rawData
                .filter(d => +d.ACC === 1)
                .map(d => ({
                    ...d,
                    Angle: +d.Angle === 360 ? 0 : +d.Angle,
                    RT: +d.RT,
                    Subject_ID: d.Subject_ID?.trim() || 'Unknown',
                    Block_Type: d.Block_Type?.trim() || '',
                }));

            if (filteredData.length === 0) {
                document.getElementById('chartWrapper').innerHTML =
                    '<p style="text-align:center;color:#e67e22;padding:40px;">没有 ACC=1 的数据</p>';
                return;
            }

            // 动态计算 Y 轴最大值（留 5% 余量）
            const Y_MAX = d3.max(filteredData, d => d.RT) * 1.05;

            // 被试列表
            const subjectIds = Array.from(new Set(filteredData.map(d => d.Subject_ID))).sort();
            const selectEl = document.getElementById('subjectSelect');
            subjectIds.forEach(id => {
                const opt = document.createElement('option');
                opt.value = id;
                opt.textContent = `被试 ${id}`;
                selectEl.appendChild(opt);
            });

            // ==================== 数据聚合 ====================
            // 个体数据：Map<Subject_ID, Map<Block_Type, lineData[]>>
            const subjectGrouped = d3.rollup(
                filteredData,
                v => d3.mean(v, d => d.RT),
                d => d.Subject_ID,
                d => d.Block_Type,
                d => d.Angle
            );

            // 总体平均
            const overallGrouped = d3.rollup(
                filteredData,
                v => d3.mean(v, d => d.RT),
                d => d.Block_Type,
                d => d.Angle
            );

            function buildLineData(angleMap) {
                return ALL_ANGLES.map(angle => {
                    let rt;
                    if (angle === 360) {
                        rt = angleMap.has(0) ? angleMap.get(0) : null;
                    } else {
                        rt = angleMap.has(angle) ? angleMap.get(angle) : null;
                    }
                    return { Angle: angle, RT: rt };
                }).sort((a, b) => a.Angle - b.Angle);
            }

            const subjectDataMap = new Map();
            for (const [subj, blockMap] of subjectGrouped) {
                const perBlockMap = new Map();
                for (const bt of BLOCK_TYPES) {
                    const angleMap = blockMap.get(bt);
                    if (angleMap && angleMap.size > 0) {
                        perBlockMap.set(bt, buildLineData(angleMap));
                    }
                }
                // 可能有的非预设类型
                for (const bt of blockMap.keys()) {
                    if (!BLOCK_TYPES.includes(bt)) {
                        perBlockMap.set(bt, buildLineData(blockMap.get(bt)));
                    }
                }
                subjectDataMap.set(subj, perBlockMap);
            }

            const overallDataMap = new Map();
            for (const bt of BLOCK_TYPES) {
                const angleMap = overallGrouped.get(bt);
                if (angleMap && angleMap.size > 0) {
                    overallDataMap.set(bt, buildLineData(angleMap));
                }
            }
            for (const bt of overallGrouped.keys()) {
                if (!BLOCK_TYPES.includes(bt)) {
                    overallDataMap.set(bt, buildLineData(overallGrouped.get(bt)));
                }
            }

            // ==================== 绘图函数 ====================
            function drawChart(containerId, title, subtitle, dataMap, viewLabel) {
                const container = document.getElementById(containerId);
                container.innerHTML = '';

                const svgWidth = 880;
                const margin = { top: 28, right: 155, bottom: 55, left: 74 };
                const plotWidth = svgWidth - margin.left - margin.right;
                const plotHeight = 420;
                const svgHeight = plotHeight + margin.top + margin.bottom;

                const wrapper = d3.select(`#${containerId}`);
                const svg = wrapper
                    .append('svg')
                    .attr('viewBox', `0 0 ${svgWidth} ${svgHeight}`)
                    .attr('preserveAspectRatio', 'xMidYMid meet')
                    .attr('width', '100%')
                    .attr('height', 'auto');

                // 绘图区域
                const plotGroup = svg.append('g')
                    .attr('transform', `translate(${margin.left},${margin.top})`);

                // 裁剪（防止点溢出）
                svg.append('defs')
                    .append('clipPath')
                    .attr('id', `plotClip-${containerId}`)
                    .append('rect')
                    .attr('x', -8)
                    .attr('y', -8)
                    .attr('width', plotWidth + 16)
                    .attr('height', plotHeight + 16);

                const clipGroup = plotGroup.append('g')
                    .attr('clip-path', `url(#plotClip-${containerId})`);

                // 比例尺
                const xScale = d3.scaleLinear()
                    .domain([0, 360])
                    .range([0, plotWidth]);

                const yScale = d3.scaleLinear()
                    .domain([0, Y_MAX])
                    .range([plotHeight, 0])
                    .nice();    // 使刻度更整洁

                // 坐标轴
                const xAxis = d3.axisBottom(xScale)
                    .tickValues(ALL_ANGLES)
                    .tickFormat(d => d)   // 去掉单位，仅显示数字
                    .tickSizeOuter(0);

                const xAxisGroup = plotGroup.append('g')
                    .attr('transform', `translate(0,${plotHeight})`)
                    .call(xAxis);

                xAxisGroup.append('text')
                    .attr('x', plotWidth / 2)
                    .attr('y', 38)
                    .attr('fill', '#333')
                    .attr('font-size', '0.85rem')
                    .attr('text-anchor', 'middle')
                    .text('Orientation of test stimulus (degrees, clockwise from upright)');

                const yAxis = d3.axisLeft(yScale)
                    .ticks(8)
                    .tickFormat(d => d)   // 去掉单位，单位在轴标题中
                    .tickSizeOuter(0);

                const yAxisGroup = plotGroup.append('g')
                    .call(yAxis);

                // Y轴标签：注意旋转中心与偏移量匹配
                yAxisGroup.append('text')
                    .attr('x', -56)
                    .attr('y', plotHeight / 2)
                    .attr('fill', '#333')
                    .attr('font-size', '0.85rem')
                    .attr('text-anchor', 'middle')
                    .attr('transform', `rotate(-90, -56, ${plotHeight / 2})`)
                    .text('Mean reaction time (milliseconds)');

                // 网格
                const gridGroup = plotGroup.append('g');
                const yTicks = yScale.ticks(8);
                gridGroup.selectAll('.grid-h')
                    .data(yTicks)
                    .enter()
                    .append('line')
                    .attr('x1', 0).attr('x2', plotWidth)
                    .attr('y1', d => yScale(d)).attr('y2', d => yScale(d))
                    .attr('stroke', '#e0e0e0')
                    .attr('stroke-width', 0.6)
                    .attr('stroke-dasharray', '3,3');

                gridGroup.selectAll('.grid-v')
                    .data(ALL_ANGLES)
                    .enter()
                    .append('line')
                    .attr('x1', d => xScale(d)).attr('x2', d => xScale(d))
                    .attr('y1', 0).attr('y2', plotHeight)
                    .attr('stroke', '#e0e0e0')
                    .attr('stroke-width', 0.6)
                    .attr('stroke-dasharray', '3,3');

                // Tooltip
                const tooltip = wrapper
                    .append('div')
                    .attr('class', 'tooltip');

                // 折线生成器
                const lineGen = d3.line()
                    .defined(d => d.RT !== null && !isNaN(d.RT))
                    .x(d => xScale(d.Angle))
                    .y(d => yScale(d.RT))
                    .curve(d3.curveLinear);

                // 绘制各 Block Type 折线与点
                const presentBlockTypes = Array.from(dataMap.keys());
                const lineGroups = {};

                for (const bt of presentBlockTypes) {
                    const lineData = dataMap.get(bt);
                    if (!lineData || lineData.length === 0) continue;
                    const color = COLOR_MAP[bt] || '#666666';

                    const path = clipGroup.append('path')
                        .datum(lineData)
                        .attr('class', 'line-path')
                        .attr('d', lineGen)
                        .attr('stroke', color)
                        .attr('stroke-width', 2)
                        .attr('data-block-type', bt);

                    const dots = clipGroup.selectAll(`.dot-${bt.replace(/\W/g, '_')}-${containerId}`)
                        .data(lineData.filter(d => d.RT !== null && !isNaN(d.RT)))
                        .enter()
                        .append('circle')
                        .attr('class', 'data-dot')
                        .attr('data-block-type', bt)
                        .attr('cx', d => xScale(d.Angle))
                        .attr('cy', d => yScale(d.RT))
                        .attr('r', 3.8)
                        .attr('fill', '#ffffff')
                        .attr('stroke', color)
                        .attr('stroke-width', 2);

                    dots.append('title')
                        .text(d => `Block ${bt}\nAngle: ${d.Angle}°\nRT: ${d.RT?.toFixed(1) ?? 'N/A'} ms`);

                    lineGroups[bt] = { path, dots, color };
                }

                // 透明宽路径用于悬停检测
                const invisiblePaths = {};
                for (const bt of presentBlockTypes) {
                    const lineData = dataMap.get(bt);
                    if (!lineData) continue;
                    const invPath = clipGroup.append('path')
                        .datum(lineData)
                        .attr('d', lineGen)
                        .attr('stroke', 'transparent')
                        .attr('stroke-width', 16)
                        .attr('fill', 'none')
                        .attr('data-block-type', bt)
                        .style('pointer-events', 'stroke')
                        .style('cursor', 'pointer');
                    invisiblePaths[bt] = invPath;
                }

                // 图例（右上区域）
                const legendGroup = svg.append('g')
                    .attr('transform', `translate(${margin.left + plotWidth + 18}, ${margin.top + 6})`);

                const legendItems = presentBlockTypes.map((bt, i) => ({
                    blockType: bt,
                    color: COLOR_MAP[bt] || '#666',
                    yOffset: 24 + i * 22,
                }));

                // 图例标题
                legendGroup.append('text')
                    .attr('x', 0)
                    .attr('y', 14)
                    .attr('font-size', '0.8rem')
                    .attr('font-weight', '600')
                    .attr('fill', '#333')
                    .text('Block Type');

                const legendItemGroups = legendGroup.selectAll('.legend-item')
                    .data(legendItems)
                    .enter()
                    .append('g')
                    .attr('class', 'legend-item')
                    .attr('data-block-type', d => d.blockType)
                    .attr('transform', d => `translate(0, ${d.yOffset})`);

                legendItemGroups.append('line')
                    .attr('x1', 0).attr('x2', 22)
                    .attr('y1', 0).attr('y2', 0)
                    .attr('stroke', d => d.color)
                    .attr('stroke-width', 2.5)
                    .attr('stroke-linecap', 'round');

                legendItemGroups.append('circle')
                    .attr('cx', 11).attr('cy', 0)
                    .attr('r', 3.5)
                    .attr('fill', '#fff')
                    .attr('stroke', d => d.color)
                    .attr('stroke-width', 2);

                legendItemGroups.append('text')
                    .attr('x', 28).attr('y', 0)
                    .attr('dy', '0.35em')
                    .attr('font-size', '0.8rem')
                    .attr('fill', '#333')
                    .text(d => d.blockType);

                // 右上角视图标识
                svg.append('text')
                    .attr('x', svgWidth - 12)
                    .attr('y', 20)
                    .attr('text-anchor', 'end')
                    .attr('font-size', '0.85rem')
                    .attr('font-weight', '600')
                    .attr('fill', '#444')
                    .text(viewLabel);

                // 交互：高亮
                let hoveredBt = null;
                function applyHighlight(bt) {
                    hoveredBt = bt;
                    for (const [key, group] of Object.entries(lineGroups)) {
                        if (bt === null) {
                            group.path.classed('dimmed', false).classed('highlighted', false);
                            group.dots.classed('dimmed', false).classed('highlighted', false);
                        } else if (key === bt) {
                            group.path.classed('dimmed', false).classed('highlighted', true);
                            group.dots.classed('dimmed', false).classed('highlighted', true);
                        } else {
                            group.path.classed('dimmed', true).classed('highlighted', false);
                            group.dots.classed('dimmed', true).classed('highlighted', false);
                        }
                    }
                    legendItemGroups.classed('dimmed', d => bt !== null && d.blockType !== bt);
                }

                // 图例悬停
                legendItemGroups
                    .on('mouseenter', (event, d) => applyHighlight(d.blockType))
                    .on('mouseleave', () => applyHighlight(null));

                // 数据点悬停
                for (const bt of presentBlockTypes) {
                    const group = lineGroups[bt];
                    if (!group) continue;

                    group.dots
                        .on('mouseenter', function (event, d) {
                            applyHighlight(bt);
                            tooltip
                                .classed('visible', true)
                                .html(`<div class="tt-label">${bt}</div>
                                       Angle: ${d.Angle}°<br>
                                       <span class="tt-rt">RT: ${d.RT?.toFixed(1) ?? 'N/A'} ms</span>`);
                        })
                        .on('mousemove', function (event) {
                            const rect = wrapper.node().getBoundingClientRect();
                            tooltip
                                .style('left', (event.clientX - rect.left) + 'px')
                                .style('top', (event.clientY - rect.top - 12) + 'px');
                        })
                        .on('mouseleave', function () {
                            applyHighlight(null);
                            tooltip.classed('visible', false);
                        });

                    // 透明路径悬停
                    const invPath = invisiblePaths[bt];
                    if (invPath) {
                        invPath
                            .on('mouseenter', () => applyHighlight(bt))
                            .on('mouseleave', () => {
                                applyHighlight(null);
                                tooltip.classed('visible', false);
                            })
                            .on('mousemove', function (event) {
                                const rect = wrapper.node().getBoundingClientRect();
                                const mouseX = event.clientX - rect.left - margin.left;
                                const lineData = dataMap.get(bt);
                                const valid = lineData.filter(d => d.RT !== null && !isNaN(d.RT));
                                if (valid.length === 0) return;
                                let closest = valid[0];
                                let minDist = Math.abs(xScale(closest.Angle) - mouseX);
                                for (const pt of valid) {
                                    const dist = Math.abs(xScale(pt.Angle) - mouseX);
                                    if (dist < minDist) { minDist = dist; closest = pt; }
                                }
                                if (minDist < 60) {
                                    tooltip
                                        .classed('visible', true)
                                        .html(`<div class="tt-label">${bt}</div>
                                               Angle: ${closest.Angle}°<br>
                                               <span class="tt-rt">RT: ${closest.RT?.toFixed(1) ?? 'N/A'} ms</span>`)
                                        .style('left', (event.clientX - rect.left) + 'px')
                                        .style('top', (event.clientY - rect.top - 12) + 'px');
                                } else {
                                    tooltip.classed('visible', false);
                                }
                            });
                    }
                }

                // 更新标题
                document.getElementById('chartTitle').textContent = title;
                document.getElementById('chartSubtitle').textContent = subtitle;
            }

            // ==================== 切换逻辑 ====================
            function renderView(subjectId) {
                if (subjectId === '__AVERAGE__') {
                    drawChart(
                        'chartWrapper',
                        '反应时间随角度变化趋势（总体平均）',
                        '仅正确试验 (ACC=1) · 按 Block Type 分组',
                        overallDataMap,
                        'AVG'
                    );
                } else {
                    const dataMap = subjectDataMap.get(subjectId);
                    if (!dataMap || dataMap.size === 0) {
                        document.getElementById('chartWrapper').innerHTML =
                            `<p style="text-align:center;padding:40px;">被试 ${subjectId} 无有效数据</p>`;
                        document.getElementById('chartTitle').textContent = '无数据';
                        document.getElementById('chartSubtitle').textContent = '';
                        return;
                    }
                    drawChart(
                        'chartWrapper',
                        `反应时间随角度变化趋势（被试 ${subjectId}）`,
                        '仅正确试验 (ACC=1) · 按 Block Type 分组',
                        dataMap,
                        `被试 ${subjectId}`
                    );
                }
            }

            // 初始加载
            renderView('__AVERAGE__');

            selectEl.addEventListener('change', function () {
                renderView(this.value);
            });

            console.log('✅ 数据加载完成，被试人数：' + subjectIds.length);
        })();
    </script>
</body>
</html>
